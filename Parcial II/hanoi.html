<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torres de Hanói — Stack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hanoi-styles.css" />
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app">

    <header class="app-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
          <path d="M14 6v16M7 22h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="9" y="10" width="10" height="3" rx="1.5" fill="#fff" opacity="0.9"/>
          <rect x="11" y="14" width="6" height="3" rx="1.5" fill="#fff" opacity="0.7"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#a78bfa"/>
              <stop offset="1" stop-color="#6366f1"/>
            </linearGradient>
          </defs>
        </svg>
        <span>HanoíStack</span>
      </div>
      <a href="index.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Cuenta Bancaria
      </a>
    </header>

    <section class="hero-section">
      <div class="stat-label">Movimientos realizados</div>
      <div class="moves-num" id="moves-display">0</div>
      <div class="moves-sub" id="moves-sub"></div>
    </section>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 6v3l2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Mínimo de movimientos</div>
          <div class="stat-val" id="min-moves">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 9h12" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Discos</div>
          <div class="stat-val" id="disk-count-display">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3l1.5 4.5H15l-4 2.5 1.5 4.5L9 12l-3.5 2.5L7 10 3 7.5h4.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="stat-label">Estado</div>
          <div class="stat-val" id="estado-display">—</div>
        </div>
      </div>
    </div>

    <div class="config-panel panel">
      <div class="panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Configuración
      </div>
      <div class="config-row">
        <div class="disk-selector">
          <span class="config-label">Número de discos</span>
          <div class="disk-btns">
            <button class="disk-btn active" data-n="3">3</button>
            <button class="disk-btn" data-n="4">4</button>
            <button class="disk-btn" data-n="5">5</button>
            <button class="disk-btn" data-n="6">6</button>
          </div>
        </div>
        <div class="action-btns">
          <button class="btn btn-reset" id="btn-reset">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M2 7.5A5.5 5.5 0 1 1 4 11.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M2 3v4.5H6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Reiniciar
          </button>
          <button class="btn btn-auto" id="btn-auto">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M5 3l7 4.5L5 12V3z" fill="currentColor"/>
            </svg>
            Resolver solo
          </button>
        </div>
      </div>
    </div>

    <div class="towers-panel panel">
      <div class="panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Torres
        <span class="selected-info" id="selected-info"></span>
      </div>
      <div class="towers-wrap" id="towers-wrap">
        <div class="tower-col" data-tower="0">
          <div class="tower-label">Torre A <span class="tower-badge">Origen</span></div>
          <div class="tower-disks" id="tower-0"></div>
          <div class="tower-pole"></div>
          <div class="tower-base"></div>
        </div>
        <div class="tower-col" data-tower="1">
          <div class="tower-label">Torre B <span class="tower-badge aux">Auxiliar</span></div>
          <div class="tower-disks" id="tower-1"></div>
          <div class="tower-pole"></div>
          <div class="tower-base"></div>
        </div>
        <div class="tower-col" data-tower="2">
          <div class="tower-label">Torre C <span class="tower-badge dest">Destino</span></div>
          <div class="tower-disks" id="tower-2"></div>
          <div class="tower-pole"></div>
          <div class="tower-base"></div>
        </div>
      </div>
    </div>

    <div class="panel log-panel">
      <div class="panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Registro de movimientos
        <button class="clear-btn" id="btn-clear-log">Limpiar</button>
      </div>
      <div class="log-list" id="log-list"></div>
    </div>

    <div class="panel stack-panel-full">
      <div class="panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="12" height="3" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="2" y="6.5" width="12" height="3" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="2" y="11" width="12" height="3" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        Estado de las pilas
      </div>
      <div class="stacks-row" id="stacks-row">
        <div class="stack-col">
          <div class="stack-col-title">Pila A</div>
          <div class="stack-nodes" id="stack-a"></div>
        </div>
        <div class="stack-col">
          <div class="stack-col-title">Pila B</div>
          <div class="stack-nodes" id="stack-b"></div>
        </div>
        <div class="stack-col">
          <div class="stack-col-title">Pila C</div>
          <div class="stack-nodes" id="stack-c"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="hanoi.js"></script>
</body>
</html>
